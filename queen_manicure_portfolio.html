<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Queen Маникюр — Портфолио</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: #0a0a0a;
      color: #ffffff;
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── HEADER ─────────────────────────────────────── */
    .site-header {
      width: 100%;
      padding: 40px 24px 20px;
      text-align: center;
    }

    .brand-name {
      font-family: 'Montserrat', sans-serif;
      font-weight: 200;
      font-size: 11px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      margin-bottom: 28px;
    }

    .portfolio-title {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(3rem, 9vw, 6.5rem);
      letter-spacing: 0.18em;
      color: #ffffff;
      line-height: 1;
    }

    /* ─── FILTER MENU ────────────────────────────────── */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      padding: 32px 24px 40px;
    }

    .filter-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.55);
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 8px 22px;
      border-radius: 999px;
      cursor: pointer;
      transition: border-color 0.35s, color 0.35s, background 0.35s;
    }

    .filter-btn:hover {
      border-color: rgba(255,255,255,0.45);
      color: rgba(255,255,255,0.85);
    }

    .filter-btn.active {
      border-color: rgba(255,255,255,0.9);
      color: #ffffff;
    }

    /* ─── MASONRY GRID ───────────────────────────────── */
    .grid-wrap {
      padding: 0 16px 80px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .masonry {
      column-count: 2;
      column-gap: 12px;
    }

    @media (min-width: 600px) {
      .masonry { column-count: 3; column-gap: 14px; }
    }
    @media (min-width: 900px) {
      .masonry { column-count: 4; column-gap: 16px; }
    }
    @media (min-width: 1200px) {
      .masonry { column-count: 5; column-gap: 18px; }
    }

    .photo-card {
      break-inside: avoid;
      margin-bottom: 14px;
      border-radius: 8px;
      overflow: hidden;
      background: #1a1a1a;
      position: relative;
      cursor: pointer;
      transition: transform 0.5s ease;
    }

    .photo-card:hover {
      transform: scale(1.02);
    }

    .photo-card img {
      display: block;
      width: 100%;
      aspect-ratio: 2 / 3;
      object-fit: cover;
      border-radius: 8px;
    }

    .photo-card.hidden {
      display: none;
    }

    /* Placeholder (shown when no image src set) */
    .photo-card .placeholder {
      width: 100%;
      aspect-ratio: 2 / 3;
      background: linear-gradient(145deg, #1c1c1c 0%, #141414 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border-radius: 8px;
      border: 1px dashed rgba(255,255,255,0.08);
    }

    .photo-card .placeholder span {
      font-size: 10px;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
    }

    .photo-card .placeholder svg {
      opacity: 0.15;
    }

    /* ─── LIGHTBOX ───────────────────────────────────── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
    }

    #lightbox.open {
      display: flex;
    }

    #lightbox img {
      max-height: 90vh;
      max-width: 90vw;
      border-radius: 6px;
      object-fit: contain;
    }

    #lightbox-close {
      position: absolute;
      top: 20px;
      right: 24px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.6);
      font-size: 32px;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
    }

    #lightbox-close:hover {
      color: #ffffff;
    }

    /* ─── FOOTER ─────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 32px 24px;
      border-top: 1px solid rgba(255,255,255,0.07);
    }

    footer p {
      font-size: 10px;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
    }
  </style>
</head>

  <!-- ─── JAVASCRIPT ─────────────────────────── -->
  <script>
    // ── FILTER ──────────────────────────────────────
    const filterBtns = document.querySelectorAll('.filter-btn');
    const cards = document.querySelectorAll('.photo-card');

    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const cat = btn.dataset.cat;
        cards.forEach(card => {
          if (cat === 'all' || card.dataset.cat === cat) {
            card.classList.remove('hidden');
          } else {
            card.classList.add('hidden');
          }
        });
      });
    });

    // ── LIGHTBOX ─────────────────────────────────────
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const lightboxClose = document.getElementById('lightbox-close');

    cards.forEach(card => {
      card.addEventListener('click', () => {
        const img = card.querySelector('img');
        if (!img) return;
        lightboxImg.src = img.src;
        lightbox.classList.add('open');
        document.body.style.overflow = 'hidden';
      });
    });

    lightboxClose.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', e => {
      if (e.target === lightbox) closeLightbox();
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeLightbox();
    });

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
      lightboxImg.src = '';
    }
  </script>
